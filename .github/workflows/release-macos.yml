name: Release (macOS)

# Build, sign, notarize, and publish a Peach Pi release.
# Trigger: push a tag like `v0.2.0`. Produces a draft GitHub Release with the
# signed .dmg + .zip, and (if configured) uploads the ZIP + RELEASES.json to S3
# so installed apps auto-update.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Import signing certificate
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          # Create a temporary keychain, import the .p12, unlock it for
          # `codesign` / `electron-osx-sign` to find the identity.
          CERT_FILE=$(mktemp -d)/cert.p12
          KEYCHAIN=peach-pi-build.keychain
          KEYCHAIN_PW=$(uuidgen)
          echo "$MAC_CERTS" | base64 --decode -o "$CERT_FILE"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT_FILE" -P "$MAC_CERTS_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          # Persist for the notarize step.
          echo "KEYCHAIN_PW=$KEYCHAIN_PW" >> "$GITHUB_ENV"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Build + make
        env:
          PEACH_PI_SIGN_IDENTITY: ${{ secrets.PEACH_PI_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PEACH_PI_UPDATE_URL: ${{ secrets.PEACH_PI_UPDATE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          # Notarytool writes progress here.
          TEMP_DIR: ${{ runner.temp }}
        run: pnpm make

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN" 2>/dev/null || true

      - name: Publish to storage (auto-update manifest)
        if: ${{ env.PEACH_PI_UPDATE_URL != '' }}
        env:
          PEACH_PI_UPDATE_URL: ${{ secrets.PEACH_PI_UPDATE_URL }}
          PEACH_PI_R2_BUCKET: ${{ secrets.PEACH_PI_R2_BUCKET }}
          PEACH_PI_R2_ACCESS_KEY_ID: ${{ secrets.PEACH_PI_R2_ACCESS_KEY_ID }}
          PEACH_PI_R2_SECRET_ACCESS_KEY: ${{ secrets.PEACH_PI_R2_SECRET_ACCESS_KEY }}
          # R2 (set in secrets to publish to Cloudflare R2):
          PEACH_PI_R2_S3_ENDPOINT: ${{ secrets.PEACH_PI_R2_S3_ENDPOINT }}
          PEACH_PI_R2_FORCE_PATH_STYLE: ${{ secrets.PEACH_PI_R2_FORCE_PATH_STYLE }}
          PEACH_PI_R2_OMIT_ACL: ${{ secrets.PEACH_PI_R2_OMIT_ACL }}
        run: |
          # Upload the ZIP + RELEASES.json to the R2 bucket so installed apps
          # pick up the new version on their next check. Forge's publisher-s3
          # is S3-compatible (R2 works with PEACH_PI_R2_S3_ENDPOINT +
          # PEACH_PI_R2_FORCE_PATH_STYLE=1 + PEACH_PI_R2_OMIT_ACL=1).
          pnpm exec electron-forge publish --platform=darwin

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            apps/desktop/out/make/**/*.dmg
            apps/desktop/out/make/**/*.zip
