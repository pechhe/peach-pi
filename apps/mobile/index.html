<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#101012" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f4f6" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Remote" />
    <!-- Don't auto-link digit runs (git SHAs, ports) as tappable phone numbers. -->
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iOS ignores SVG touch icons — it needs a full-bleed PNG (iOS applies
         its own corner mask; pre-rounded corners would show black wedges). -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Remote · peach-pi</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
